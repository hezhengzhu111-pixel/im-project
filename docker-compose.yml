version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im_db
    ports:
      - "3306:3306"
    volumes:
      - ~/home/data/mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --innodb-buffer-pool-size=128M --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ~/home/data/redis:/data
    command: redis-server --appendonly yes --maxmemory 128mb
 
  kafka:
    image: apache/kafka:3.7.0
    container_name: im-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@im-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://im-kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

  im-gateway:
    build:
      context: ./backend/gateway
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-gateway
    restart: unless-stopped
    ports:
      - "8080:8082"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      SPRING_DATA_REDIS_HOST: im-redis

  im-auth:
    build:
      context: ./backend/auth-service
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-auth
    restart: unless-stopped
    ports:
      - "8083:8084"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      SPRING_DATA_REDIS_HOST: im-redis

  im-user:
    build:
      context: ./backend/user-service
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-user
    restart: unless-stopped
    ports:
      - "8081:8085"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_user_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: im-redis
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092

  im-group:
    build:
      context: ./backend/group-service
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-group
    restart: unless-stopped
    ports:
      - "8082:8086"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_group_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123

  im-message:
    build:
      context: ./backend/message-service
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-message
    restart: unless-stopped
    ports:
      - "8084:8087"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_message_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092

  im-file:
    build:
      context: ./backend/file-service
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-file
    restart: unless-stopped
    ports:
      - "8086:8088"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      IM_COS_ENABLED: false

  im-server:
    image: new-im-project-im-server:${IM_IMAGE_TAG:-local}
    build:
      context: ./backend/im-server
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-server
    restart: unless-stopped
    ports:
      - "8085:8083"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092
      AUTH_SERVICE_URL: http://im-auth:8084
      SPRING_DATA_REDIS_HOST: im-redis
      IM_INTERNAL_HEADER: X-Internal-Secret
      IM_INTERNAL_SECRET: im-internal-secret
      IM_SERVICE_URL: http://im-server:8083
    volumes:
      - ./logs/im-server:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8083/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      retries: 15

  im-frontend:
    build:
      context: ./frontend
      args:
        IM_BUILD_NONCE: ${IM_BUILD_NONCE:-0}
    container_name: im-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

networks:
  default:
    name: im-network
