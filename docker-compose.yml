version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im_db
    ports:
      - "3306:3306"
    volumes:
      - ~/home/data/mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --innodb-buffer-pool-size=128M --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ~/home/data/redis:/data
    command: redis-server --appendonly yes --maxmemory 128mb
 
  kafka:
    image: bitnami/kafka:3.7.0-debian-11-r0
    container_name: im-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@im-kafka:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://im-kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"

  im-gateway:
    build: ./backend/gateway
    container_name: im-gateway
    restart: unless-stopped
    ports:
      - "8080:8082"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      SPRING_DATA_REDIS_HOST: im-redis

  im-auth:
    build: ./backend/auth-service
    container_name: im-auth
    restart: unless-stopped
    ports:
      - "8083:8084"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      SPRING_DATA_REDIS_HOST: im-redis

  im-user:
    build: ./backend/user-service
    container_name: im-user
    restart: unless-stopped
    ports:
      - "8081:8085"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_user_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123
      SPRING_DATA_REDIS_HOST: im-redis
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092

  im-group:
    build: ./backend/group-service
    container_name: im-group
    restart: unless-stopped
    ports:
      - "8082:8086"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_group_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123

  im-message:
    build: ./backend/message-service
    container_name: im-message
    restart: unless-stopped
    ports:
      - "8084:8087"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_NAME: service_message_service_db
      DB_USERNAME: root
      DB_PASSWORD: root123
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092

  im-server:
    build: ./backend/im-server
    container_name: im-server
    restart: unless-stopped
    ports:
      - "8085:8083"
    depends_on:
      - kafka
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      KAFKA_BOOTSTRAP_SERVERS: im-kafka:9092

  im-frontend:
    build: ./frontend
    container_name: im-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

networks:
  default:
    name: im-network
