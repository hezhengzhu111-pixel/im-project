version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: im_db
    ports:
      - "3306:3306"
    volumes:
      - ~/home/data/mysql:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --innodb-buffer-pool-size=128M --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ~/home/data/redis:/data
    command: redis-server --appendonly yes --maxmemory 128mb

  im-gateway:
    build: ./backend/gateway
    container_name: im-gateway
    restart: unless-stopped
    ports:
      - "8080:8082"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false

  im-auth:
    build: ./backend/auth-service
    container_name: im-auth
    restart: unless-stopped
    ports:
      - "8083:8084"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      SPRING_DATA_REDIS_HOST: im-redis

  im-user:
    build: ./backend/user-service
    container_name: im-user
    restart: unless-stopped
    ports:
      - "8081:8085"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql
      DB_USERNAME: appuser
      DB_PASSWORD: app123456
      SPRING_DATA_REDIS_HOST: im-redis

  im-group:
    build: ./backend/group-service
    container_name: im-group
    restart: unless-stopped
    ports:
      - "8082:8086"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql

  im-message:
    build: ./backend/message-service
    container_name: im-message
    restart: unless-stopped
    ports:
      - "8084:8087"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false
      DB_HOST: im-mysql

  im-file:
    build: ./backend/file-service
    container_name: im-file
    restart: unless-stopped
    ports:
      - "8086:8088"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false

  im-server:
    build: ./backend/im-server
    container_name: im-server
    restart: unless-stopped
    ports:
      - "8085:8083"
    environment:
      SPRING_CLOUD_NACOS_DISCOVERY_ENABLED: false

  im-frontend:
    build: ./frontend
    container_name: im-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

networks:
  default:
    name: im-network
