services:
  mysql:
    image: "${MYSQL_IMAGE:-mysql:8.0}"
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root123}"
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - p1_sit_mysql:/var/lib/mysql
      - ./sql/mysql8/init_all.sql:/docker-entrypoint-initdb.d/01-init_all.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  redis:
    image: "${REDIS_IMAGE:-redis:7.2-alpine}"
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - "${REDIS_PASSWORD:-root123}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - p1_sit_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-root123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20

  migrate:
    image: "${MYSQL_IMAGE:-mysql:8.0}"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_PWD: "${MYSQL_ROOT_PASSWORD:-root123}"
    volumes:
      - ./sql/mysql8/e2ee_migration.sql:/migrations/e2ee_migration.sql:ro
    command:
      - sh
      - -c
      - mysql -hmysql -uroot --default-character-set=utf8mb4 < /migrations/e2ee_migration.sql

  api-server:
    image: im-project-p1-sit/api-server:latest
    build:
      context: ./rust
      dockerfile: apps/api-server/Dockerfile
      args:
        IM_BUILD_NONCE: "${IM_BUILD_NONCE:-p1-sit}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      API_SERVER_RS_PORT: "8082"
      MYSQL_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root123}@mysql:3306/service_message_service_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_CACHE_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_PRIVATE_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_PRIVATE_HOT_REDIS_URLS: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_GROUP_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_GROUP_HOT_REDIS_URLS: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_PRIVATE_EVENT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_GROUP_EVENT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      IM_ROUTE_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@redis:6379/0"
      JWT_SECRET: "${JWT_SECRET:-im-access-secret-im-access-secret-im-access-secret-im-access-secret}"
      AUTH_REFRESH_SECRET: "${AUTH_REFRESH_SECRET:-im-refresh-secret-im-refresh-secret-im-refresh-secret-im-refresh-secret}"
      IM_INTERNAL_SECRET: "${IM_INTERNAL_SECRET:-im-internal-secret-im-internal-secret-im-internal-secret-im}"
      IM_GATEWAY_AUTH_SECRET: "${IM_GATEWAY_AUTH_SECRET:-im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}"
      IM_MESSAGE_WRITER_ENABLED: "true"
      IM_PUSH_DISPATCHER_ENABLED: "false"
      IM_STORAGE_LOCAL_BASE_DIR: "/tmp/im-files"
      RUST_LOG: "${RUST_LOG:-api_server_rs=info,tower_http=warn,sqlx::query=off}"
    ports:
      - "${API_SERVER_PORT:-8082}:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  p1_sit_mysql:
  p1_sit_redis:
