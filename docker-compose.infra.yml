version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 100102024hua@
      MYSQL_DATABASE: im_db
    ports:
      - "3306:3306"
    volumes:
      - ~/home/data/mysql:/var/lib/mysql
    command: --character-set-server=utf8mb4 --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ~/home/data/redis:/data
    command: redis-server --appendonly yes --maxmemory 128mb

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: im-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: im-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

networks:
  default:
    name: im-infrastructure
