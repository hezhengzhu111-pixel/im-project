groups:
  - name: gateway-rate-limit
    rules:
      - alert: GatewayRateLimitRejectSpike
        expr: sum(rate(im_gateway_rate_limit_decisions_total{result="reject"}[5m])) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 网关限流拒绝量持续升高
          description: 过去 5 分钟网关限流拒绝速率超过阈值，请检查新规则发布或异常流量。

      - alert: GatewayRateLimitRedisLatencyHigh
        expr: histogram_quantile(0.99, sum(rate(im_gateway_rate_limit_redis_latency_seconds_bucket[5m])) by (le, operation)) > 0.02
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: 网关限流 Redis P99 延迟过高
          description: 限流 Lua/Redis 往返耗时上升，可能影响整体网关 RT。

      - alert: GatewayRateLimitShadowRejectUnexpected
        expr: sum(rate(im_gateway_rate_limit_decisions_total{result="shadow_reject"}[10m])) > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: 双读灰度命中高风险规则
          description: Shadow 模式下已有大量 would-block，请先审查规则再切换到 ENFORCE。
