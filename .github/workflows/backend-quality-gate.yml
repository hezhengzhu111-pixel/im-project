name: quality-gate

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-quality-gate.yml"
      - "Makefile"
      - "README.md"
      - "README.en.md"
  push:
    branches: [ "main", "master" ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/backend-quality-gate.yml"
      - "Makefile"
      - "README.md"
      - "README.en.md"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run backend tests
        run: mvn -f backend/pom.xml test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build
