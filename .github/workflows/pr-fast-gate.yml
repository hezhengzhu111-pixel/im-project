name: PR Fast Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FLUTTER_VERSION: "3.29"

jobs:
  pr-fast:
    name: PR Fast Gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Run PR Fast Gate
        run: python tests/test.py pr-fast

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-fast-gate-reports
          path: |
            build/reports/
