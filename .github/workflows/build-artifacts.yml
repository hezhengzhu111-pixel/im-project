name: Build Artifacts

on:
  push:
    paths:
      - 'rust/**'
      - 'flutter/**'
      - 'spring-ai/**'
      - 'sql/**'
      - 'scripts/build.py'
      - '.github/workflows/build-artifacts.yml'
  pull_request:
    paths:
      - 'rust/**'
      - 'flutter/**'
      - 'spring-ai/**'
      - 'sql/**'
      - 'scripts/build.py'
      - '.github/workflows/build-artifacts.yml'
  workflow_dispatch:

jobs:
  build-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          cache-directories: |
            build/cache/cargo-target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y maven

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Clean accidental source pollution from cache
        run: python scripts/imctl.py clean source-pollution

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Build all artifacts
        run: python scripts/build.py

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: im-build-artifacts
          path: |
            build/dist/
            build/manifest.json
            build/logs/
