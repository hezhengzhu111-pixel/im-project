name: E2EE Rust CI

on:
  push:
    paths:
      - 'rust/crates/im-e2ee-core/**'
      - 'rust/crates/im-e2ee-ffi/**'
      - 'rust/crates/im-e2ee-wasm/**'
      - 'tests/test.py'
      - '.github/workflows/e2ee-rust-ci.yml'
  pull_request:
    paths:
      - 'rust/crates/im-e2ee-core/**'
      - 'rust/crates/im-e2ee-ffi/**'
      - 'rust/crates/im-e2ee-wasm/**'
      - 'tests/test.py'
      - '.github/workflows/e2ee-rust-ci.yml'
  workflow_dispatch:

jobs:
  e2ee-rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          cache-directories: |
            build/cache/cargo-target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Clean accidental source pollution from cache
        run: python scripts/imctl.py clean source-pollution

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Run E2EE Rust gate
        run: python tests/test.py e2ee-rust

      - name: Scan e2ee crate sources for forbidden patterns
        run: |
          set -euo pipefail
          PATTERNS='\.unwrap\(|\.expect\(|\bunsafe\b|panic!|unreachable!|todo!|unimplemented!'
          MATCHES=$(grep -rnE "$PATTERNS" rust/crates/im-e2ee-core/src/*.rs | grep -v 'forbid(unsafe_code)') || true
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo "::error::Forbidden patterns found in crates/im-e2ee-core/src/"
            exit 1
          fi
          echo "PASS: crates/im-e2ee-core/src is clean"
          echo ""
          echo "=== crates/im-e2ee-ffi/src (report only) ==="
          grep -rnE "$PATTERNS" rust/crates/im-e2ee-ffi/src/*.rs || echo "  clean"
          echo "=== crates/im-e2ee-wasm/src (report only) ==="
          grep -rnE "$PATTERNS" rust/crates/im-e2ee-wasm/src/*.rs || echo "  clean"

      - name: Upload E2EE reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2ee-rust-reports
          path: |
            build/reports/
            build/logs/
          retention-days: 14
