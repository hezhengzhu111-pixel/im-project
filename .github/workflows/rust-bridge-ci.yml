name: Rust Bridge CI

on:
  push:
    paths:
      - 'rust/crates/im-flutter-bridge/**'
      - 'rust/crates/im-e2ee-core/**'
      - 'flutter/packages/rust_bridge/**'
      - 'flutter/packages/core/**'
      - 'flutter/packages/core_flutter/**'
      - 'flutter/packages/shared_features/**'
      - 'flutter/apps/web/**'
      - 'flutter/apps/desktop/**'
      - 'flutter/apps/mobile/**'
      - 'tests/test.py'
      - '.github/workflows/rust-bridge-ci.yml'
  pull_request:
    paths:
      - 'rust/crates/im-flutter-bridge/**'
      - 'rust/crates/im-e2ee-core/**'
      - 'flutter/packages/rust_bridge/**'
      - 'flutter/packages/core/**'
      - 'flutter/packages/core_flutter/**'
      - 'flutter/packages/shared_features/**'
      - 'flutter/apps/web/**'
      - 'flutter/apps/desktop/**'
      - 'flutter/apps/mobile/**'
      - 'tests/test.py'
      - '.github/workflows/rust-bridge-ci.yml'
  workflow_dispatch:

jobs:
  rust-bridge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          cache-directories: |
            build/cache/cargo-target

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Clean accidental source pollution from cache
        run: python scripts/imctl.py clean source-pollution

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Run Rust Bridge gate
        run: python tests/test.py rust-bridge

      - name: Upload bridge reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rust-bridge-reports
          path: |
            build/reports/
            build/logs/
          retention-days: 14
