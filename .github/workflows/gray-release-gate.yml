name: Gray Release Gate

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: Gray environment name (e.g., local-gray, staging, personal-gray)
        type: string
        default: local-gray
        required: true
      api_base_url:
        description: Backend API base URL
        type: string
        default: http://localhost:8082
        required: true
      web_base_url:
        description: Web application base URL
        type: string
        default: ""
      ws_base_url:
        description: WebSocket base URL
        type: string
        default: ""
      db_url:
        description: MySQL URL for plaintext scan (will be sanitized in logs)
        type: string
        default: mysql://root:root123@127.0.0.1:3306/service_message_service_db
        required: true
      redis_url:
        description: Redis URL
        type: string
        default: ""
      run_sit:
        description: Run P0/P1 SIT (if false, will result in NO-GO)
        type: boolean
        default: true
      run_env_check:
        description: Run environment pre-check (if false, will result in NO-GO)
        type: boolean
        default: true
      run_smoke:
        description: Run smoke tests (if false, will result in NO-GO)
        type: boolean
        default: true
      run_frontend_build:
        description: Run frontend build verification (if false, will result in NO-GO)
        type: boolean
        default: true
      upload_artifacts:
        description: Upload reports and artifacts
        type: boolean
        default: true
      operator:
        description: Operator name
        type: string
        default: ${{ github.actor }}

env:
  CARGO_TERM_COLOR: always
  FLUTTER_VERSION: "3.29"
  IM_API_BASE: ${{ inputs.api_base_url }}
  IM_WS_BASE: ${{ inputs.ws_base_url }}
  IM_DB_URL: ${{ inputs.db_url }}
  REDIS_URL: ${{ inputs.redis_url }}
  GRAY_ENV: ${{ inputs.environment_name }}
  OPERATOR: ${{ inputs.operator }}

jobs:
  gray-release:
    name: Gray Release Gate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install coverage tools
        run: cargo install cargo-llvm-cov --locked

      - name: Install Python dependencies
        run: |
          pip install requests pymysql redis
          pip install -r scripts/requirements.txt 2>/dev/null || true

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Generate build info
        run: |
          python tests/gates/gray_report.py build-info \
            --env "${{ env.GRAY_ENV }}" \
            --api-base "${{ env.IM_API_BASE }}" \
            --ws-base "${{ env.IM_WS_BASE }}" \
            --db-url "${{ env.IM_DB_URL }}" \
            --operator "${{ env.OPERATOR }}"

      - name: Run environment pre-check
        if: ${{ inputs.run_env_check }}
        run: |
          python tests/gates/gray_env_check.py \
            --env "${{ env.GRAY_ENV }}" \
            --api-base "${{ env.IM_API_BASE }}" \
            --ws-base "${{ env.IM_WS_BASE }}" \
            --db-url "${{ env.IM_DB_URL }}" \
            --redis-url "${{ env.REDIS_URL }}"

      - name: Mark env check not run
        if: ${{ !inputs.run_env_check }}
        run: |
          mkdir -p build/reports
          echo '{"status":"NOT RUN","reason":"run_env_check=false"}' > build/reports/gray-env-check.json

      - name: Run manifest and PR Fast gate
        continue-on-error: true
        run: |
          python tests/test.py manifest
          python tests/test.py pr-fast

      - name: Run coverage gate
        continue-on-error: true
        run: python tests/test.py coverage

      - name: Run Main Full gate
        continue-on-error: true
        run: python tests/test.py main-full

      - name: Run Gray Release gate
        if: ${{ inputs.run_sit }}
        continue-on-error: true
        run: |
          python tests/test.py gray-release \
            --api-base "${{ env.IM_API_BASE }}" \
            --db-url "${{ env.IM_DB_URL }}"

      - name: Mark SIT not run
        if: ${{ !inputs.run_sit }}
        run: |
          mkdir -p build/reports
          echo "# Gray Release Gate" > build/reports/gray-gate-report.md
          echo "NOT RUN: run_sit=false" >> build/reports/gray-gate-report.md
          echo '{"summary":{"pass":0,"fail":0,"skip":1},"steps":[{"name":"Gray Release SIT","status":"SKIP","reason":"run_sit=false","critical":true}]}' > build/reports/gray-gate-report.json

      - name: Run smoke tests
        if: ${{ inputs.run_smoke }}
        run: |
          python tests/gates/gray_smoke.py \
            --env "${{ env.GRAY_ENV }}" \
            --api-base "${{ env.IM_API_BASE }}" \
            --ws-base "${{ env.IM_WS_BASE }}" \
            --db-url "${{ env.IM_DB_URL }}" \
            --prefix "gray_${{ github.run_id }}_$(date +%s)"

      - name: Mark smoke not run
        if: ${{ !inputs.run_smoke }}
        run: |
          mkdir -p build/reports
          echo '{"overall_status":"NOT RUN","reason":"run_smoke=false","summary":{"total":0,"passed":0,"failed":0,"not_run":0,"critical_failures":0},"scenarios":[]}' > build/reports/gray-smoke.json

      - name: Run frontend build verification
        if: ${{ inputs.run_frontend_build }}
        run: |
          python tests/gates/gray_frontend_check.py \
            --env "${{ env.GRAY_ENV }}" \
            --api-base "${{ env.IM_API_BASE }}" \
            --ws-base "${{ env.IM_WS_BASE }}"

      - name: Mark frontend build not run
        if: ${{ !inputs.run_frontend_build }}
        run: |
          mkdir -p build/reports
          echo '{"status":"NOT RUN","reason":"run_frontend_build=false","targets":{}}' > build/reports/gray-frontend-build.json

      - name: Generate final report
        if: always()
        run: |
          python tests/gates/gray_report.py finalize \
            --build-info build/reports/gray-build-info.json \
            --env-check build/reports/gray-env-check.json \
            --gate-summary build/reports/gray-gate-report.json \
            --smoke build/reports/gray-smoke.json \
            --coverage build/reports/coverage/coverage-summary.json \
            --manifest build/reports/manifest/test-manifest-check.json \
            --frontend-build build/reports/gray-frontend-build.json \
            --out build/reports/gray-release-report.md

      - name: Determine GO/NO-GO decision
        if: always()
        id: decision
        run: |
          if [ -f build/reports/gray-release-report.md ]; then
            if grep -q "### GO" build/reports/gray-release-report.md; then
              echo "decision=GO" >> $GITHUB_OUTPUT
              echo "## ✅ GO" >> $GITHUB_STEP_SUMMARY
            elif grep -q "### NO-GO" build/reports/gray-release-report.md; then
              echo "decision=NO-GO" >> $GITHUB_OUTPUT
              echo "## ❌ NO-GO" >> $GITHUB_STEP_SUMMARY
              exit 1
            else
              echo "decision=HOLD" >> $GITHUB_OUTPUT
              echo "## ⚠️ HOLD" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "decision=UNKNOWN" >> $GITHUB_OUTPUT
            echo "## ❓ UNKNOWN - Final report not generated" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Generate workflow summary
        if: always()
        run: |
          cat >> $GITHUB_STEP_SUMMARY <<'EOF'
          ## Gray Release Gate Results

          | Item | Status |
          | --- | --- |
          | Environment | ${{ inputs.environment_name }} |
          | API Base | ${{ inputs.api_base_url }} |
          | Operator | ${{ inputs.operator }} |
          | Commit | ${{ github.sha }} |
          EOF

          if [ -f build/reports/gray-release-report.md ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            cat build/reports/gray-release-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ❌ Final report not generated" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload gray release artifacts
        if: always() && inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gray-release-gate-artifacts-${{ github.run_id }}
          path: |
            build/reports/
          retention-days: 30
