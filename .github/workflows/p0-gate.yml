name: P0 Acceptance Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      sit_enabled:
        description: 'Run full SIT (requires backend + MySQL)'
        type: boolean
        default: false
      base_url:
        description: 'Backend base URL for SIT'
        type: string
        default: 'http://localhost:8082'
      db_url:
        description: 'MySQL URL for DB plaintext scan'
        type: string
        default: 'mysql://root:root123@127.0.0.1:3306/service_message_service_db'

env:
  CARGO_TERM_COLOR: always
  FLUTTER_VERSION: '3.29'

jobs:
  # ==========================================================================
  # PR Fast gate: Rust (fmt + check + test + clippy) + Flutter (analyze + test)
  # ==========================================================================
  pr-fast:
    name: PR Fast Gate (Rust + Flutter)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check lifecycle prerequisites
        run: python scripts/imctl.py doctor

      - name: Run PR Fast gate
        run: python tests/test.py pr-fast

      - name: Upload gate reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-gate-reports
          path: |
            build/reports/
            build/logs/
          retention-days: 14

  # ==========================================================================
  # P0-1 E2EE SIT (manual gate via workflow_dispatch)
  # ==========================================================================
  sit:
    name: P0-1 E2EE SIT
    runs-on: ubuntu-24.04
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.sit_enabled }}
    needs: [pr-fast]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: service_message_service_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install requests pymysql

      - name: Run P1 SIT gate
        run: |
          python tests/sit/p1_sit_gate.py \
            --base-url ${{ inputs.base_url }} \
            --db-url ${{ inputs.db_url }} \
            --skip-p0-gate

      - name: Upload SIT artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p0-sit-artifacts
          path: |
            build/reports/
            build/logs/
          retention-days: 14
