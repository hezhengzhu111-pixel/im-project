<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Primary Meta -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:site_name" content="IM">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@im_app">
  <meta name="twitter:image" content="icons/icon-512.png">

  <!-- Apple -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IM">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <!-- Preconnect to CanvasKit CDN to speed up renderer download. -->
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="dns-prefetch" href="https://unpkg.com">

  <!-- Preload the Flutter bootstrap so it can start fetching main.dart.js ASAP. -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <!-- Preload the main Dart bundle so the browser starts downloading it in parallel. -->
  <link rel="preload" href="main.dart.js" as="script">

  <title>IM</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    /* Loading indicator */
    .loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #ffffff;
      z-index: 10000;
    }

    .loading-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    .loading-logo span {
      color: white;
      font-size: 32px;
      font-weight: bold;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-text {
      color: #666;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    /* Offline fallback styles */
    .offline-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: #ff6b6b;
      color: white;
      text-align: center;
      padding: 8px;
      z-index: 9999;
      font-family: sans-serif;
      font-size: 14px;
      transform: translateY(-100%);
      transition: transform 0.3s ease;
    }

    .offline-banner.visible {
      transform: translateY(0);
    }

    @media (prefers-color-scheme: dark) {
      .loading-indicator {
        background: #1a1a2e;
      }
      .loading-text {
        color: #aaa;
      }
      .loading-spinner {
        border-color: #333;
        border-top-color: #667eea;
      }
    }
  </style>
</head>
<body>
  <!-- Loading indicator -->
  <div id="loading-indicator" class="loading-indicator">
    <div class="loading-logo">
      <span>IM</span>
    </div>
    <div class="loading-text">Loading...</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Offline banner shown by service worker -->
  <div id="offline-banner" class="offline-banner">
    You are offline. Some features may be unavailable.
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Remove loading indicator when Flutter is ready
    window.addEventListener('flutter-first-frame', () => {
      const loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.style.opacity = '0';
        loadingIndicator.style.transition = 'opacity 0.3s ease';
        setTimeout(() => {
          loadingIndicator.remove();
        }, 300);
      }
    });

    // Fallback: remove loading indicator after 15s even if Flutter fails
    setTimeout(() => {
      const indicator = document.getElementById('loading-indicator');
      if (indicator) {
        console.warn('Flutter first-frame event not received; removing loading indicator via timeout.');
        indicator.style.opacity = '0';
        indicator.style.transition = 'opacity 0.3s ease';
        setTimeout(() => indicator.remove(), 300);
      }
    }, 15000);

    // Flutter Web is served as a live IM client. Do not keep an app-shell
    // service worker because stale main.dart.js can reference removed chunks.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
          if ('caches' in window) {
            const names = await caches.keys();
            await Promise.all(names.map((name) => caches.delete(name)));
          }
        } catch (error) {
          console.log('SW cleanup failed:', error);
        }
      });
    }

    // Show/hide offline banner
    function updateOnlineStatus() {
      const banner = document.getElementById('offline-banner');
      if (banner) {
        if (navigator.onLine) {
          banner.classList.remove('visible');
        } else {
          banner.classList.add('visible');
        }
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
