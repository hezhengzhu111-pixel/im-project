server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Connection tuning
    tcp_nopush on;
    tcp_nodelay on;

    # Compression for text-based assets (JS/CSS/JSON/SVG/WASM glue).
    # On-the-fly gzip typically reduces main.dart.js by 60-70%.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/rss+xml
        application/atom+xml
        image/svg+xml
        text/javascript
        application/wasm;

    # Cross-origin isolation for SharedArrayBuffer / flutter_rust_bridge.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # API proxy - forward to backend server
    # Keep the /api/ prefix so both /api/user/login and the legacy
    # /api/api/user/login requests from older clients reach the correct
    # backend route (/api/user/login).
    location /api/ {
        proxy_pass http://im-api-server:8082/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # WebSocket proxy used by the Flutter client.
    location /websocket/ {
        proxy_pass http://im-server:8083/websocket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Backward-compatible alias for older clients.
    location /ws/ {
        proxy_pass http://im-server:8083/websocket/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # Rust bridge WASM files. These are not content-hashed, so they must
    # be revalidated on every load to pick up new deployments.
    location /pkg/ {
        expires -1;
        add_header Cache-Control "public, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Flutter assets (images, fonts, etc.). Cached for one day; updates are
    # picked up on the next deployment day or via cache-busting query params.
    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Hashed Flutter deferred chunks (e.g. main.dart.js_*.part.js).
    # File names contain content hashes, so they are immutable.
    location ~ ^/main\.dart\.js_ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # App shell entry point - never cache without validation.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Flutter bootstrap - must revalidate so new deployments are picked up.
    location = /flutter_bootstrap.js {
        expires -1;
        add_header Cache-Control "public, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Main Dart bundle - must revalidate so new deployments are picked up.
    location = /main.dart.js {
        expires -1;
        add_header Cache-Control "public, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Service workers - must always be fresh.
    location = /service_worker.js {
        expires -1;
        add_header Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location = /flutter_service_worker.js {
        expires -1;
        add_header Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Manifest and app icons are versioned implicitly by app release.
    location ~* ^/(manifest\.json|icons/.*)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    # Generic static assets. Cache for one day and revalidate.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
