# flutter/apps/web/pubspec.yaml
name: im_web
description: IM Web Application
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

flutter:
  generate: true
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  im_core:
    path: ../../packages/core
  im_ui:
    path: ../../packages/ui
  im_core_flutter:
    path: ../../packages/core_flutter
  im_shared_features:
    path: ../../packages/shared_features
  im_rust_bridge:
    path: ../../packages/rust_bridge
  im_l10n:
    path: ../../packages/l10n
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ">=0.19.0 <0.21.0"
  idb_shim: ^2.6.1+7
  crypto: ^3.0.6
  file_picker: ^11.0.2
  url_launcher: ^6.2.0
  video_player: ^2.8.0
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  mockito: ^5.4.4
  very_good_analysis: ^5.1.0
