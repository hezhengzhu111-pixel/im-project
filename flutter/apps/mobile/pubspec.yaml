name: im_mobile
description: IM Mobile Application
version: 0.1.0
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

flutter:
  uses-material-design: true

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  im_core:
    path: ../../packages/core
  im_ui:
    path: ../../packages/ui
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  flutter_secure_storage: ^9.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  intl: ">=0.19.0 <0.21.0"
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.1.0
  record: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  freezed: ^2.4.5
  json_serializable: ^6.7.1
  very_good_analysis: ^5.1.0
