# flutter/melos.yaml
name: im_flutter
repository: https://github.com/example/im-flutter

packages:
  - packages/**
  - apps/**

scripts:
  build:web:
    run: dart run tool/build_web.dart
  build:all:
    run: cd .. && python scripts/build.py all
  test:
    run: dart run melos exec -- flutter test
  analyze:
    run: dart run melos exec -- flutter analyze

  rust-bridge:smoke:
    run: dart run packages/rust_bridge/tool/rust_bridge_smoke.dart
    description: Build the Rust bridge release library and verify FrbRustGateway native initialization

  test:web:
    run: dart run melos exec --scope="im_web" -- flutter test
    description: 运行 Flutter Web 单元测试和 widget 测试

  analyze:web:
    run: dart run melos exec --scope="im_web" -- flutter analyze
    description: 分析 Flutter Web 代码质量

  coverage:web:
    run: dart run melos exec --scope="im_web" -- flutter test --coverage
    description: 生成 Flutter Web 测试覆盖率报告（lcov）

  test:integration:
    run: dart run melos exec --scope="im_web" -- flutter test integration_test/
    description: 运行 Flutter Web 整合测试

  format:check:
    run: dart run melos exec -- dart format --set-exit-if-changed .
    description: 检查代码格式
