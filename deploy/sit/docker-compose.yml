  im-files-init:
    image: "${ALPINE_IMAGE:-docker.m.daocloud.io/library/alpine:3.20}"
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        mkdir -p /data/im-files
        chown -R 10001:10001 /data/im-files
    volumes:
      - im_files:/data/im-files
    networks:
      - im-sit-network

  im-server:
    image: im-project-sit/im-server:latest
    build:
      context: ../../backend
      dockerfile: im-server-rs/Dockerfile
      args:
        IM_BUILD_NONCE: "${IM_BUILD_NONCE:-manual}"
    restart: unless-stopped
    depends_on:
      im-redis-route:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      IM_SERVER_RS_PORT: "8083"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-route:6379/0"
      IM_ROUTE_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-route:6379/0"
      IM_AUTH_SERVICE_URL: "${IM_AUTH_SERVICE_URL:-http://im-api-server:8082}"
      IM_GROUP_SERVICE_URL: "${IM_GROUP_SERVICE_URL:-http://127.0.0.1:9}"
      IM_INTERNAL_SECRET: "${IM_INTERNAL_SECRET:-im-internal-secret-im-internal-secret-im-internal-secret-im}"
      IM_GATEWAY_AUTH_SECRET: "${IM_GATEWAY_AUTH_SECRET:-im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}"
      IM_INSTANCE_ID: "${IM_INSTANCE_ID:-im-server:8083}"
      IM_INTERNAL_HTTP_URL: "${IM_INTERNAL_HTTP_URL:-http://im-server:8083}"
      IM_INTERNAL_WS_URL: "${IM_INTERNAL_WS_URL:-ws://im-server:8083}"
      IM_WEBSOCKET_OUTBOUND_QUEUE_SIZE: "${IM_WEBSOCKET_OUTBOUND_QUEUE_SIZE:-1024}"
    ports:
      - "${IM_SERVER_PORT:-8083}:8083"
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    networks:
      - im-sit-network

  im-api-server:
    image: im-project-sit/im-api-server:latest
    build:
      context: ../../backend
      dockerfile: api-server-rs/Dockerfile
      args:
        IM_BUILD_NONCE: "${IM_BUILD_NONCE:-manual}"
    restart: unless-stopped
    depends_on:
      im-mysql:
        condition: service_healthy
      im-redis:
        condition: service_healthy
      im-redis-private-hot:
        condition: service_healthy
      im-redis-private-hot-2:
        condition: service_healthy
      im-redis-private-hot-3:
        condition: service_healthy
      im-redis-private-hot-4:
        condition: service_healthy
      im-redis-group-hot:
        condition: service_healthy
      im-redis-group-hot-2:
        condition: service_healthy
      im-redis-group-hot-3:
        condition: service_healthy
      im-redis-group-hot-4:
        condition: service_healthy
      im-redis-events-private:
        condition: service_healthy
      im-redis-events-group:
        condition: service_healthy
      im-redis-route:
        condition: service_healthy
      im-files-init:
        condition: service_completed_successfully
      im-server:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      RUST_LOG: "${API_SERVER_RUST_LOG:-api_server_rs=info,im_observe=info,tower_http=warn,sqlx::query=off}"
      API_SERVER_RS_PORT: "8082"
      MYSQL_URL: "mysql://root:${MYSQL_ROOT_PASSWORD:-root123}@im-mysql:3306/service_message_service_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis:6379/0"
      IM_CACHE_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis:6379/0"
      IM_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot:6379/0"
      IM_PRIVATE_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot:6379/0"
      IM_PRIVATE_HOT_REDIS_URLS: "redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot-2:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot-3:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-private-hot-4:6379/0"
      IM_GROUP_HOT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-group-hot:6379/0"
      IM_GROUP_HOT_REDIS_URLS: "redis://:${REDIS_PASSWORD:-root123}@im-redis-group-hot:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-group-hot-2:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-group-hot-3:6379/0,redis://:${REDIS_PASSWORD:-root123}@im-redis-group-hot-4:6379/0"
      IM_PRIVATE_EVENT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-events-private:6379/0"
      IM_GROUP_EVENT_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-events-group:6379/0"
      IM_ROUTE_REDIS_URL: "redis://:${REDIS_PASSWORD:-root123}@im-redis-route:6379/0"
      JWT_SECRET: "${JWT_SECRET:-im-access-secret-im-access-secret-im-access-secret-im-access-secret}"
      AUTH_REFRESH_SECRET: "${AUTH_REFRESH_SECRET:-im-refresh-secret-im-refresh-secret-im-refresh-secret-im-refresh-secret}"
      AUTH_WS_TICKET_TTL_SECONDS: "${AUTH_WS_TICKET_TTL_SECONDS:-120}"
      IM_INTERNAL_SECRET: "${IM_INTERNAL_SECRET:-im-internal-secret-im-internal-secret-im-internal-secret-im}"
      IM_GATEWAY_AUTH_SECRET: "${IM_GATEWAY_AUTH_SECRET:-im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}"
      IM_AUTH_SERVICE_URL: "${IM_AUTH_SERVICE_URL:-http://im-api-server:8082}"
      IM_USER_SERVICE_URL: "${IM_USER_SERVICE_URL:-http://127.0.0.1:9}"
      IM_GROUP_SERVICE_URL: "${IM_GROUP_SERVICE_URL:-http://127.0.0.1:9}"
      IM_MESSAGE_SERVICE_URL: "${IM_MESSAGE_SERVICE_URL:-http://127.0.0.1:9}"
      IM_FILE_SERVICE_URL: "${IM_FILE_SERVICE_URL:-http://im-api-server:8082}"
      IM_LOG_SERVICE_URL: "${IM_LOG_SERVICE_URL:-http://127.0.0.1:9}"
      IM_REGISTRY_SERVICE_URL: "${IM_REGISTRY_SERVICE_URL:-http://127.0.0.1:9}"
      IM_SERVER_ROUTE_URI: "${IM_SERVER_ROUTE_URI:-http://im-server:8083}"
      IM_SERVER_WS_ROUTE_URI: "${IM_SERVER_WS_ROUTE_URI:-ws://im-server:8083}"
      IM_EVENT_STREAM_KEY: "${IM_EVENT_STREAM_KEY:-im:events}"
      IM_PRIVATE_EVENT_STREAM_KEY: "${IM_PRIVATE_EVENT_STREAM_KEY:-im:events:private}"
      IM_GROUP_EVENT_STREAM_KEY: "${IM_GROUP_EVENT_STREAM_KEY:-im:events:group}"
      IM_EVENT_STREAM_MAX_LEN: "${IM_EVENT_STREAM_MAX_LEN:-100000}"
      IM_EVENT_STREAM_BLOCK_MS: "${IM_EVENT_STREAM_BLOCK_MS:-1000}"
      IM_MYSQL_MAX_CONNECTIONS: "${IM_MYSQL_MAX_CONNECTIONS:-64}"
      IM_PUBLISHER_BATCH_SIZE: "${IM_PUBLISHER_BATCH_SIZE:-1000}"
      IM_PUBLISHER_LOOP_INTERVAL_MS: "${IM_PUBLISHER_LOOP_INTERVAL_MS:-10}"
      IM_WRITER_BATCH_SIZE: "${IM_WRITER_BATCH_SIZE:-1000}"
      IM_WRITER_FLUSH_INTERVAL_MS: "${IM_WRITER_FLUSH_INTERVAL_MS:-1000}"
      IM_PUSH_DISPATCHER_ENABLED: "${IM_PUSH_DISPATCHER_ENABLED:-true}"
      IM_STORAGE_LOCAL_BASE_DIR: "${IM_STORAGE_LOCAL_BASE_DIR:-/data/im-files}"
      IM_FILE_IMAGE_MAX_SIZE: "${IM_FILE_IMAGE_MAX_SIZE:-20971520}"
      IM_FILE_FILE_MAX_SIZE: "${IM_FILE_FILE_MAX_SIZE:-536870912}"
      IM_FILE_AUDIO_MAX_SIZE: "${IM_FILE_AUDIO_MAX_SIZE:-104857600}"
      IM_FILE_VIDEO_MAX_SIZE: "${IM_FILE_VIDEO_MAX_SIZE:-1073741824}"
      IM_FILE_AVATAR_MAX_SIZE: "${IM_FILE_AVATAR_MAX_SIZE:-5242880}"
      IM_FILE_MULTIPART_MAX_BYTES: "${IM_FILE_MULTIPART_MAX_BYTES:-1082130432}"
    ports:
      - "${GATEWAY_PORT:-8082}:8082"
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    volumes:
      - im_files:/data/im-files
    networks:
      - im-sit-network

  im-frontend:
    image: im-project-sit/im-frontend:latest
    build:
      context: ../../frontend
      args:
        FRONTEND_BUILD_MODE: "${FRONTEND_BUILD_MODE:-sit}"
        IM_BUILD_NONCE: "${IM_BUILD_NONCE:-manual}"
    restart: unless-stopped
    depends_on:
      im-api-server:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
    sysctls:
      net.ipv4.ip_local_port_range: "1024 65535"
      net.ipv4.tcp_tw_reuse: "1"
    ports:
      - "${FRONTEND_PORT:-80}:80"
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    volumes:
      - im_files:/data/im-files:ro
    networks:
      - im-sit-network

networks:
  im-sit-network:
    name: "${GLOBAL_DOCKER_NETWORK:-im-sit-network}"
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  redis_private_hot_data:
  redis_private_hot_data_2:
  redis_private_hot_data_3:
  redis_private_hot_data_4:
  redis_group_hot_data:
  redis_group_hot_data_2:
  redis_group_hot_data_3:
  redis_group_hot_data_4:
  redis_private_events_data:
  redis_group_events_data:
  redis_route_data:
  im_files:
