services:
  im-mysql:
    image: "${MYSQL_IMAGE:-docker.m.daocloud.io/library/mysql:8.0.39}"
    restart: unless-stopped
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root123}"
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../sql/mysql8/init_all.sql:/docker-entrypoint-initdb.d/01-init_all.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - im-sit-network

  im-redis:
    image: "${REDIS_IMAGE:-docker.m.daocloud.io/library/redis:7.2-alpine}"
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "${REDIS_APPENDONLY:-no}"
      - --save
      - "${REDIS_SAVE:-}"
      - --requirepass
      - "${REDIS_PASSWORD:-root123}"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-root123}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 20
    networks:
      - im-sit-network

