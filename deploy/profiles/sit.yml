# SIT 测试环境配置
profile: sit

# 服务配置
services:
  default:
    - im-server
    - im-api-server
    - im-frontend
    - im-admin-server

  include_ai: true

# 构建配置
build:
  docker: true
  pull: true
  parallel: true
  profile: release

# 数据库配置
database:
  auto_init: true
  auto_migrate: true

# 健康检查
health:
  timeout: 240
  wait: true

# 日志配置
logging:
  verbose: true
  debug: false

# 报告配置
reports:
  generate: true
