version: '3.8'

services:
  elasticsearch:
    image: elasticsearch:8.10.4
    container_name: admin-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - admin-network

  kibana:
    image: kibana:8.10.4
    container_name: admin-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - admin-network

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.4
    container_name: admin-filebeat
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/log/im-project:/var/log/im-project:ro
    networks:
      - admin-network

networks:
  admin-network:
    driver: bridge

volumes:
  es_data:
