apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    root = file("../../")
    reactNativeDir = file("../../../../node_modules/react-native")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false
def propOrEnv = { propName, envName, fallbackValue ->
    project.findProperty(propName) ?: System.getenv(envName) ?: fallbackValue
}
def parsePositiveInt = { fieldName, value, fallbackValue ->
    def normalized = String.valueOf(value ?: fallbackValue).trim()
    try {
        def parsed = Integer.parseInt(normalized)
        if (parsed <= 0) {
            throw new NumberFormatException("must be greater than 0")
        }
        return parsed
    } catch (NumberFormatException exception) {
        throw new GradleException("${fieldName} must be a positive integer: ${normalized}", exception)
    }
}
def quoteBuildConfig = { value ->
    "\"${String.valueOf(value).replace("\\", "\\\\").replace("\"", "\\\"")}\""
}
def validateUrl = { fieldName, value, schemes ->
    def normalized = String.valueOf(value ?: "").trim()
    if (!normalized) {
        return
    }
    try {
        def parsed = new URI(normalized)
        if (!(parsed.scheme in schemes)) {
            throw new GradleException("${fieldName} must use one of ${schemes.join(', ')}: ${normalized}")
        }
    } catch (Exception exception) {
        throw new GradleException("Invalid ${fieldName}: ${normalized}", exception)
    }
}
def defaultAppEnv = "dev-emulator"
def defaultApiBaseUrl = "http://10.0.2.2:8082/api"
def defaultWsBaseUrl = "ws://10.0.2.2:8082"
def defaultFileBaseUrl = "http://10.0.2.2:8082"
def allowedAppEnvs = ["dev-emulator", "dev-device", "sit", "prod", "internal", "debug"] as Set
def releaseBuildRequested = gradle.startParameter.taskNames.any { taskName ->
    String.valueOf(taskName).toLowerCase(Locale.ROOT).contains("release")
}
def mobileAppEnv = String.valueOf(propOrEnv("IM_MOBILE_APP_ENV", "IM_MOBILE_APP_ENV", defaultAppEnv)).trim()
if (!mobileAppEnv) {
    mobileAppEnv = defaultAppEnv
}
if (!allowedAppEnvs.contains(mobileAppEnv)) {
    throw new GradleException("Unsupported IM_MOBILE_APP_ENV=${mobileAppEnv}. Supported values: ${allowedAppEnvs.join(', ')}")
}
def mobileApiBaseUrl = String.valueOf(propOrEnv("IM_MOBILE_API_BASE_URL", "IM_MOBILE_API_BASE_URL", defaultApiBaseUrl)).trim()
def mobileWsBaseUrl = String.valueOf(propOrEnv("IM_MOBILE_WS_BASE_URL", "IM_MOBILE_WS_BASE_URL", defaultWsBaseUrl)).trim()
def mobileFileBaseUrl = String.valueOf(propOrEnv("IM_MOBILE_FILE_BASE_URL", "IM_MOBILE_FILE_BASE_URL", defaultFileBaseUrl)).trim()
validateUrl("IM_MOBILE_API_BASE_URL", mobileApiBaseUrl, ["http", "https"])
validateUrl("IM_MOBILE_WS_BASE_URL", mobileWsBaseUrl, ["ws", "wss"])
validateUrl("IM_MOBILE_FILE_BASE_URL", mobileFileBaseUrl, ["http", "https"])
def mobileVersionCode = parsePositiveInt("IM_MOBILE_VERSION_CODE", propOrEnv("IM_MOBILE_VERSION_CODE", "IM_MOBILE_VERSION_CODE", "1"), "1")
def mobileVersionName = String.valueOf(propOrEnv("IM_MOBILE_VERSION_NAME", "IM_MOBILE_VERSION_NAME", "0.0.1")).trim()
if (!mobileVersionName) {
    mobileVersionName = "0.0.1"
}
def enableReleaseMinify = propOrEnv("IM_MOBILE_MINIFY_RELEASE", "IM_MOBILE_MINIFY_RELEASE", "false").toBoolean()
def releaseSigning = [
        IM_MOBILE_RELEASE_STORE_FILE    : String.valueOf(propOrEnv("IM_MOBILE_RELEASE_STORE_FILE", "IM_MOBILE_RELEASE_STORE_FILE", "")).trim(),
        IM_MOBILE_RELEASE_STORE_PASSWORD: String.valueOf(propOrEnv("IM_MOBILE_RELEASE_STORE_PASSWORD", "IM_MOBILE_RELEASE_STORE_PASSWORD", "")).trim(),
        IM_MOBILE_RELEASE_KEY_ALIAS     : String.valueOf(propOrEnv("IM_MOBILE_RELEASE_KEY_ALIAS", "IM_MOBILE_RELEASE_KEY_ALIAS", "")).trim(),
        IM_MOBILE_RELEASE_KEY_PASSWORD  : String.valueOf(propOrEnv("IM_MOBILE_RELEASE_KEY_PASSWORD", "IM_MOBILE_RELEASE_KEY_PASSWORD", "")).trim(),
]
def missingReleaseSigning = releaseSigning.findAll { !it.value }.collect { it.key }
def hasReleaseSigning = missingReleaseSigning.isEmpty()
if (releaseBuildRequested && !hasReleaseSigning) {
    throw new GradleException(
            "Release signing requires all environment variables or Gradle properties: " +
                    "IM_MOBILE_RELEASE_STORE_FILE, IM_MOBILE_RELEASE_STORE_PASSWORD, IM_MOBILE_RELEASE_KEY_ALIAS, IM_MOBILE_RELEASE_KEY_PASSWORD. " +
                    "Missing: ${missingReleaseSigning.join(', ')}"
    )
}
if (hasReleaseSigning && !file(releaseSigning.IM_MOBILE_RELEASE_STORE_FILE).exists()) {
    throw new GradleException("Release keystore file does not exist: ${releaseSigning.IM_MOBILE_RELEASE_STORE_FILE}")
}

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.immobile"
    defaultConfig {
        applicationId "com.immobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode mobileVersionCode
        versionName mobileVersionName
        buildConfigField "String", "IM_MOBILE_APP_ENV", quoteBuildConfig(mobileAppEnv)
        buildConfigField "String", "IM_MOBILE_API_BASE_URL", quoteBuildConfig(mobileApiBaseUrl)
        buildConfigField "String", "IM_MOBILE_WS_BASE_URL", quoteBuildConfig(mobileWsBaseUrl)
        buildConfigField "String", "IM_MOBILE_FILE_BASE_URL", quoteBuildConfig(mobileFileBaseUrl)
        buildConfigField "boolean", "IM_MOBILE_RELEASE_BUILD", "false"
        manifestPlaceholders = [
            usesCleartextTraffic: "true"
        ]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseSigning.IM_MOBILE_RELEASE_STORE_FILE)
                storePassword releaseSigning.IM_MOBILE_RELEASE_STORE_PASSWORD
                keyAlias releaseSigning.IM_MOBILE_RELEASE_KEY_ALIAS
                keyPassword releaseSigning.IM_MOBILE_RELEASE_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [
                usesCleartextTraffic: "true"
            ]
        }
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            buildConfigField "boolean", "IM_MOBILE_RELEASE_BUILD", "true"
            manifestPlaceholders = [
                usesCleartextTraffic: "false"
            ]
            minifyEnabled enableProguardInReleaseBuilds || enableReleaseMinify
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

afterEvaluate {
    android.applicationVariants.all { variant ->
        if (variant.buildType.name != "release") {
            return
        }
        variant.preBuildProvider.configure {
            doFirst {
                def usesEmulatorFallback = [mobileApiBaseUrl, mobileWsBaseUrl, mobileFileBaseUrl].any { value ->
                    String.valueOf(value).contains("10.0.2.2")
                }
                def allowInternalReleaseFallback = mobileAppEnv in ["internal", "debug"]
                if (usesEmulatorFallback && !allowInternalReleaseFallback) {
                    throw new GradleException(
                        "Release build cannot use dev-emulator fallback URLs. Set IM_MOBILE_API_BASE_URL / IM_MOBILE_WS_BASE_URL / IM_MOBILE_FILE_BASE_URL and use IM_MOBILE_APP_ENV=sit or prod. " +
                        "Only IM_MOBILE_APP_ENV=internal/debug may explicitly keep 10.0.2.2 for internal builds."
                    )
                }
            }
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // UniFFI-generated Rust E2EE bindings require JNA for native library loading
    implementation("net.java.dev.jna:jna:5.15.0@aar")

    testImplementation("junit:junit:4.13.2")
}
