resolver 127.0.0.11 ipv6=off valid=30s;

upstream im_api_backend {
    zone im_api_backend 64k;
    server im-api-server:8082 resolve max_fails=3 fail_timeout=5s;
    keepalive 2048;
    keepalive_requests 5000;
    keepalive_timeout 15s;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 1200m;
    keepalive_timeout 300s;
    keepalive_requests 100000;
    sendfile on;
    tcp_nopush on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location /js/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /css/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /files/ {
        alias /data/im-files/;
        autoindex off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location /api {
        proxy_pass http://im_api_backend;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        error_page 500 502 503 504 = @api_upstream_error;
    }

    location /websocket {
        proxy_pass http://im_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location @api_upstream_error {
        internal;
        default_type application/json;
        return 502 '{"success":false,"code":502,"message":"api upstream unavailable"}';
    }
}
