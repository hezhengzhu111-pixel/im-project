server:
  port: 8082

spring:
  application:
    name: im-gateway
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  cloud:
    gateway:
      routes:
        - id: auth-internal
          uri: lb://im-auth-service
          predicates:
            - Path=/api/auth/internal/**
        - id: user-internal
          uri: lb://im-user-service
          predicates:
            - Path=/api/user/internal/**
        - id: group-internal
          uri: lb://im-group-service
          predicates:
            - Path=/api/group/internal/**
        - id: user-test
          uri: lb://im-user-service
          predicates:
            - Path=/api/user/test/**
          filters:
            - RewritePath=/api/user/test(?<segment>/.*), /test$\{segment}
        - id: auth-service
          uri: lb://im-auth-service
          predicates:
            - Path=/auth/**,/api/auth/**
          filters:
            - RewritePath=/(?<prefix>api/)?auth(?<segment>/.*), $\{segment}
        - id: user-service
          uri: lb://im-user-service
          predicates:
            - Path=/user/**,/friend/**,/api/user/**,/api/friend/**
          filters:
            - RewritePath=/(?<prefix>api/)?user(?<segment>/.*), /user$\{segment}
            - RewritePath=/(?<prefix>api/)?friend(?<segment>/.*), /api/friend$\{segment}
        - id: group-service
          uri: lb://im-group-service
          predicates:
            - Path=/group/**,/groups/**,/api/group/**,/api/groups/**
          filters:
            - RewritePath=/(?<prefix>api/)?groups?(?<segment>/.*), /s$\{segment}
        - id: message-service
          uri: lb://im-message-service
          predicates:
            - Path=/message/**,/messages/**,/api/message/**,/api/messages/**
          filters:
            - RewritePath=/(?<prefix>api/)?messages?(?<segment>/.*), /s$\{segment}
        - id: file-service
          uri: lb://im-file-service
          predicates:
            - Path=/file/**,/api/file/**
          filters:
            - RewritePath=/(?<prefix>api/)?file(?<segment>/.*), $\{segment}
        - id: im-server
          uri: lb://im-server
          predicates:
            - Path=/im/**,/api/im/**
          filters:
            - RewritePath=/(?<prefix>api/)?im(?<segment>/.*), /api/im$\{segment}
        - id: im-server-prefix
          uri: lb://im-server
          predicates:
            - Path=/im-server/**
          filters:
            - RewritePath=/im-server(?<segment>/.*), $\{segment}
        - id: im-websocket
          uri: lb:ws://im-server
          predicates:
            - Path=/websocket/**
        - id: openapi-auth
          uri: lb://im-auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: openapi-user
          uri: lb://im-user-service
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - RewritePath=/v3/api-docs/user, /v3/api-docs
        - id: openapi-group
          uri: lb://im-group-service
          predicates:
            - Path=/v3/api-docs/group
          filters:
            - RewritePath=/v3/api-docs/group, /v3/api-docs
        - id: openapi-message
          uri: lb://im-message-service
          predicates:
            - Path=/v3/api-docs/message
          filters:
            - RewritePath=/v3/api-docs/message, /v3/api-docs
        - id: openapi-file
          uri: lb://im-file-service
          predicates:
            - Path=/v3/api-docs/file
          filters:
            - RewritePath=/v3/api-docs/file, /v3/api-docs
        - id: openapi-im
          uri: lb://im-server
          predicates:
            - Path=/v3/api-docs/im
          filters:
            - RewritePath=/v3/api-docs/im, /v3/api-docs
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

jwt:
  secret: ${JWT_SECRET:im-backend-secret-key-for-jwt-token-generation-im-backend-secret-key-2026}

im:
  routing:
    host:
      auth: 127.0.0.1
      user: 127.0.0.1
      group: 127.0.0.1
      message: 127.0.0.1
      file: 127.0.0.1
      imServer: 127.0.0.1
