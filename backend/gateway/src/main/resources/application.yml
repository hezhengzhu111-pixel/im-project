server:
  port: 8082

spring:
  application:
    name: im-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://im-auth:8084
          predicates:
            - Path=/auth/**,/api/auth/**
        - id: user-service
          uri: http://im-user:8085
          predicates:
            - Path=/user/**,/friend/**,/api/user/**,/api/friend/**
          filters:
            - RewritePath=/api/(user|friend)(?<segment>/.*), /\$\{segment}
        - id: group-service
          uri: http://im-group:8086
          predicates:
            - Path=/group/**,/groups/**,/api/group/**,/api/groups/**
          filters:
            - RewritePath=/api/(group|groups)(?<segment>/.*), /\$\{segment}
        - id: message-service
          uri: http://im-message:8087
          predicates:
            - Path=/message/**,/messages/**,/api/message/**,/api/messages/**
          filters:
            - RewritePath=/api/(message|messages)(?<segment>/.*), /\$\{segment}
        - id: file-service
          uri: http://im-file:8088
          predicates:
            - Path=/file/**,/api/file/**
          filters:
            - RewritePath=/api/file(?<segment>/.*), /\$\{segment}
        - id: im-server
          uri: http://im-server:8083
          predicates:
            - Path=/im/**,/api/im/**
          filters:
            - RewritePath=/api/im(?<segment>/.*), /\$\{segment}
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

jwt:
  secret: ${JWT_SECRET:im-backend-secret-key-for-jwt-token-generation}
