server:
  port: 8082

spring:
  application:
    name: im-gateway
  cloud:
    gateway:
      routes:
        - id: auth-internal
          uri: http://im-auth:8084
          predicates:
            - Path=/api/auth/internal/**
        - id: user-internal
          uri: http://im-user:8085
          predicates:
            - Path=/api/user/internal/**
        - id: group-internal
          uri: http://im-group:8086
          predicates:
            - Path=/api/group/internal/**
        - id: user-test
          uri: http://im-user:8085
          predicates:
            - Path=/api/user/test/**
          filters:
            - RewritePath=/api/user/test(?<segment>/.*), /test$\{segment}
        - id: auth-service
          uri: http://im-auth:8084
          predicates:
            - Path=/auth/**,/api/auth/**
          filters:
            - RewritePath=/(?<prefix>api/)?auth(?<segment>/.*), /$\{segment}
        - id: user-service
          uri: http://im-user:8085
          predicates:
            - Path=/user/**,/friend/**,/api/user/**,/api/friend/**
          filters:
            - RewritePath=/(?<prefix>api/)?user(?<segment>/.*), /user$\{segment}
            - RewritePath=/(?<prefix>api/)?friend(?<segment>/.*), /api/friend$\{segment}
        - id: group-service
          uri: http://im-group:8086
          predicates:
            - Path=/group/**,/groups/**,/api/group/**,/api/groups/**
          filters:
            - RewritePath=/(?<prefix>api/)?groups?(?<segment>/.*), /s$\{segment}
        - id: message-service
          uri: http://im-message:8087
          predicates:
            - Path=/message/**,/messages/**,/api/message/**,/api/messages/**
          filters:
            - RewritePath=/(?<prefix>api/)?messages?(?<segment>/.*), /s$\{segment}
        - id: file-service
          uri: http://im-file:8088
          predicates:
            - Path=/file/**,/api/file/**
          filters:
            - RewritePath=/(?<prefix>api/)?file(?<segment>/.*), $\{segment}
        - id: im-server
          uri: http://im-server:8083
          predicates:
            - Path=/im/**,/api/im/**
          filters:
            - RewritePath=/(?<prefix>api/)?im(?<segment>/.*), /api/im$\{segment}
        - id: im-server-prefix
          uri: http://im-server:8083
          predicates:
            - Path=/im-server/**
          filters:
            - RewritePath=/im-server(?<segment>/.*), $\{segment}
        - id: im-websocket
          uri: ws://im-server:8083
          predicates:
            - Path=/websocket/**
        - id: openapi-auth
          uri: http://im-auth:8084
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: openapi-user
          uri: http://im-user:8085
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - RewritePath=/v3/api-docs/user, /v3/api-docs
        - id: openapi-group
          uri: http://im-group:8086
          predicates:
            - Path=/v3/api-docs/group
          filters:
            - RewritePath=/v3/api-docs/group, /v3/api-docs
        - id: openapi-message
          uri: http://im-message:8087
          predicates:
            - Path=/v3/api-docs/message
          filters:
            - RewritePath=/v3/api-docs/message, /v3/api-docs
        - id: openapi-file
          uri: http://im-file:8088
          predicates:
            - Path=/v3/api-docs/file
          filters:
            - RewritePath=/v3/api-docs/file, /v3/api-docs
        - id: openapi-im
          uri: http://im-server:8083
          predicates:
            - Path=/v3/api-docs/im
          filters:
            - RewritePath=/v3/api-docs/im, /v3/api-docs
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

jwt:
  secret: ${JWT_SECRET:im-backend-secret-key-for-jwt-token-generation}
