server:
  port: 8082

spring:
  application:
    name: im-gateway
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://im-auth:8084
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: http://im-user:8085
          predicates:
            - Path=/api/v1/user/**,/api/v1/friend/**
          filters:
            - RewritePath=/api/v1(?<segment>/.*), /api$\{segment}
        - id: group-service
          uri: http://im-group:8086
          predicates:
            - Path=/api/v1/groups/**
        - id: message-service
          uri: http://im-message:8087
          predicates:
            - Path=/api/v1/messages/**
        - id: file-service
          uri: http://im-file:8088
          predicates:
            - Path=/api/v1/file/**
        - id: im-server
          uri: http://im-server:8083
          predicates:
            - Path=/api/v1/im/**
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

jwt:
  secret: ${JWT_SECRET:im-backend-secret-key-for-jwt-token-generation}
