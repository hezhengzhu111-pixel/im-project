server:
  port: 8082

spring:
  application:
    name: im-gateway
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  cloud:
    gateway:
      routes:
        - id: auth-internal
          uri: lb://im-auth-service
          predicates:
            - Path=/api/auth/internal/**
        - id: user-internal
          uri: lb://im-user-service
          predicates:
            - Path=/api/user/internal/**
        - id: group-internal
          uri: lb://im-group-service
          predicates:
            - Path=/api/group/internal/**
        - id: user-test
          uri: lb://im-user-service
          predicates:
            - Path=/api/user/test/**
          filters:
            - RewritePath=/api/user/test(?<segment>/.*), /test$\{segment}
        - id: auth-service
          uri: lb://im-auth-service
          predicates:
            - Path=/auth/**,/api/auth/**
          filters:
            - RewritePath=/(?<prefix>api/)?auth(?<segment>/.*), $\{segment}
        - id: user-service
          uri: lb://im-user-service
          predicates:
            - Path=/user/**,/friend/**,/api/user/**,/api/friend/**
          filters:
            - RewritePath=/(?<prefix>api/)?user(?<segment>/.*), /user$\{segment}
            - RewritePath=/(?<prefix>api/)?friend(?<segment>/.*), /api/friend$\{segment}
        - id: group-service
          uri: lb://im-group-service
          predicates:
            - Path=/group/**,/groups/**,/api/group/**,/api/groups/**
          filters:
            - RewritePath=/(?<prefix>api/)?groups?(?<segment>/.*), /s$\{segment}
        - id: message-service
          uri: lb://im-message-service
          predicates:
            - Path=/message/**,/messages/**,/api/message/**,/api/messages/**
          filters:
            - RewritePath=/(?<prefix>api/)?messages?(?<segment>/.*), /s$\{segment}
        - id: file-service
          uri: lb://im-file-service
          predicates:
            - Path=/file/**,/api/file/**
          filters:
            - RewritePath=/(?<prefix>api/)?file(?<segment>/.*), $\{segment}
        - id: log-service
          uri: lb://im-log-service
          predicates:
            - Path=/api/logs/**
        - id: registry-monitor
          uri: lb://im-registry-monitor
          predicates:
            - Path=/registry/**,/api/registry/**
          filters:
            - RewritePath=/(?<prefix>api/)?registry(?<segment>/.*), $\{segment}
        - id: im-server
          uri: lb://im-server
          predicates:
            - Path=/im/**,/api/im/**
          filters:
            - RewritePath=/(?<prefix>api/)?im(?<segment>/.*), /api/im$\{segment}
        - id: im-server-prefix
          uri: lb://im-server
          predicates:
            - Path=/im-server/**
          filters:
            - RewritePath=/im-server(?<segment>/.*), $\{segment}
        - id: im-websocket
          uri: lb:ws://im-server
          predicates:
            - Path=/websocket/**
        - id: openapi-auth
          uri: lb://im-auth-service
          predicates:
            - Path=/v3/api-docs/auth
          filters:
            - RewritePath=/v3/api-docs/auth, /v3/api-docs
        - id: openapi-user
          uri: lb://im-user-service
          predicates:
            - Path=/v3/api-docs/user
          filters:
            - RewritePath=/v3/api-docs/user, /v3/api-docs
        - id: openapi-group
          uri: lb://im-group-service
          predicates:
            - Path=/v3/api-docs/group
          filters:
            - RewritePath=/v3/api-docs/group, /v3/api-docs
        - id: openapi-message
          uri: lb://im-message-service
          predicates:
            - Path=/v3/api-docs/message
          filters:
            - RewritePath=/v3/api-docs/message, /v3/api-docs
        - id: openapi-file
          uri: lb://im-file-service
          predicates:
            - Path=/v3/api-docs/file
          filters:
            - RewritePath=/v3/api-docs/file, /v3/api-docs
        - id: openapi-im
          uri: lb://im-server
          predicates:
            - Path=/v3/api-docs/im
          filters:
            - RewritePath=/v3/api-docs/im, /v3/api-docs
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  header: Authorization
  prefix: "Bearer "

im:
  virtual-threads:
    enabled: false
  logging:
    root-dir: /var/log/im-project
  snowflake:
    worker-id: 1
    datacenter-id: 2
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth-service-url: ${IM_GATEWAY_AUTH_SERVICE_URL:lb://im-auth-service}
    auth:
      request-timeout-ms: ${IM_GATEWAY_AUTH_REQUEST_TIMEOUT_MS:3000}
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      token-cache-ttl-seconds: ${IM_GATEWAY_AUTH_TOKEN_CACHE_TTL_SECONDS:10}
      token-negative-cache-ttl-seconds: ${IM_GATEWAY_AUTH_TOKEN_NEGATIVE_CACHE_TTL_SECONDS:5}
      user-resource-cache-ttl-seconds: ${IM_GATEWAY_AUTH_USER_RESOURCE_CACHE_TTL_SECONDS:15}
  security:
    token-revocation-check:
      enabled: true
  routing:
    host:
      auth: ${IM_ROUTE_AUTH_HOST:im-auth-service}
      user: ${IM_ROUTE_USER_HOST:im-user-service}
      group: ${IM_ROUTE_GROUP_HOST:im-group-service}
      message: ${IM_ROUTE_MESSAGE_HOST:im-message-service}
      file: ${IM_ROUTE_FILE_HOST:im-file-service}
      imServer: ${IM_ROUTE_IM_SERVER_HOST:im-server}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.im: INFO
