spring.application.name=im-spring-ai
server.port=8084

# Java 25 Virtual Threads - 全局启用
spring.threads.virtual.enabled=true

# Graceful Shutdown (Spring Boot 4.0 默认开启，此处调超时)
spring.lifecycle.timeout-per-shutdown-phase=30s

spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Spring AI 1.1.5 - template key (overridden per-request via BYOK mutate)
spring.ai.openai.api-key=placeholder
spring.ai.openai.base-url=https://api.openai.com/v1

# Internal service config
im.ai.task-stream-key=im:ai:tasks
im.api-server.url=${IM_API_SERVER_URL:http://127.0.0.1:8082}
im.internal.secret=${IM_INTERNAL_SECRET:im-internal-secret-default}

# Spring AI ChatClient autoconfig
spring.ai.chat.client.enabled=true
