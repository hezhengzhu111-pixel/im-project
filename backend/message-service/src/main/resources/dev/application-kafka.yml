spring:
  kafka:
    bootstrap-servers: ${IM_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 10
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
    consumer:
      group-id: im-message-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-commit-interval: 300000
      max-poll-records: 100
      max-poll-interval: 300000
    listener:
      missing-topics-fatal: false

im:
  kafka:
    topic:
      private-message: im-private-message-topic
      group-message: im-group-message-topic
      read-receipt: im-read-receipt-topic
      push-prefix: im-ws-push-

