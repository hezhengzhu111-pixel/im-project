spring:
  kafka:
    bootstrap-servers: ${IM_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 10
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        spring.json.add.type.headers: false
    consumer:
      group-id: im-message-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      auto-commit-interval: 300000
      max-poll-records: 500
      max-poll-interval: 300000
      properties:
        spring.json.trusted.packages: com.im.dto,com.im.enums
        spring.json.value.default.type: com.im.dto.MessageEvent
        spring.json.use.type.headers: false
    listener:
      missing-topics-fatal: false

im:
  message:
    conversation-cache:
      last-message-key-prefix: "last_message:"
      user-index-key-prefix: "conversation:index:user:"
      user-unread-key-prefix: "conversation:unread:user:"
      ttl-seconds: 3600
  kafka:
    send-timeout-ms: 2000
    chat-topic: im-chat-topic
    read-topic: im-read-topic
    status-topic: im-status-topic
    topic:
      private-message: im-private-message-topic
      group-message: im-group-message-topic
      read-receipt: im-read-receipt-topic
      push-prefix: im-ws-push-

