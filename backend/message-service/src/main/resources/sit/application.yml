server:
  port: 8087

spring:
  application:
    name: im-message-service
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

im:
  jwt:
    enabled: ${IM_JWT_ENABLED:true}
  security:
    mode: ${IM_SECURITY_MODE:gateway}
  message:
    text:
      enforce: ${IM_MESSAGE_TEXT_ENFORCE:true}
      max-length: ${IM_MESSAGE_TEXT_MAX_LENGTH:2000}
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET}
  gateway:
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET}
  outbox:
    max-attempts: ${IM_OUTBOX_MAX_ATTEMPTS:20}
    batch-size: ${IM_OUTBOX_BATCH_SIZE:100}
    base-backoff-ms: ${IM_OUTBOX_BASE_BACKOFF_MS:1000}
    retry-interval-ms: ${IM_OUTBOX_RETRY_INTERVAL_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
