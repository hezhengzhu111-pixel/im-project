server:
  port: 8087

spring:
  application:
    name: im-message-service
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

im:
  jwt:
    enabled: true
  virtual-threads:
    enabled: false
  logging:
    root-dir: /var/log/im-project
  snowflake:
    worker-id: 5
    datacenter-id: 2
  security:
    mode: gateway
    gateway-only:
      enabled: false
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  message:
    text:
      enforce: true
      max-length: 2000
    lock:
      ttl-seconds: 5
    user-cache:
      key-prefix: "user:brief:"
      ttl-minutes: 10
      l1-ttl-seconds: 60
      l1-max-size: 10000
    friend-cache:
      key-prefix: "message:friend:"
      l1-ttl-seconds: 30
      l2-ttl-seconds: 60
      l1-max-size: 20000
    group-member-cache:
      key-prefix: "message:group:member:"
      l1-ttl-seconds: 30
      l2-ttl-seconds: 60
      l1-max-size: 30000
    group-member-ids-cache:
      key-prefix: "message:group:members:"
      l1-ttl-seconds: 15
      l2-ttl-seconds: 30
      l1-max-size: 5000
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  outbox:
    max-attempts: 20
    batch-size: 100
    base-backoff-ms: 1000
    retry-interval-ms: 5000
    send-timeout-ms: 30000
    recover-sending-timeout-ms: 120000
    recover-sending-interval-ms: 60000
  ws:
    channel-prefix: "im:msg:channel:"
  route:
    users-key: "im:route:users"
    lease-key-prefix: "im:route:lease:"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000

logging:
  level:
    root: INFO
    com.im: INFO
