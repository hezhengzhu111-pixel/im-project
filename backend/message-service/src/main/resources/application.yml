server:
  port: 8087

spring:
  application:
    name: im-message-service
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  profiles:
    active: im,mysql
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:im-kafka:9092}
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        service: ${spring.application.name}
        heart-beat-interval: 1000
        heart-beat-timeout: 90000
        ip-delete-timeout: 120000
        naming-load-cache-at-start: false
  data:
    redis:
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: ${REDIS_TIMEOUT:3000ms}
      password: ${REDIS_PASSWORD:}
      host: ${REDIS_HOST:im-redis}

im:
  jwt:
    enabled: ${IM_JWT_ENABLED:true}
  security:
    mode: ${IM_SECURITY_MODE:gateway}
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret}
  gateway:
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret}
  outbox:
    max-attempts: ${IM_OUTBOX_MAX_ATTEMPTS:20}
    batch-size: ${IM_OUTBOX_BATCH_SIZE:100}
    base-backoff-ms: ${IM_OUTBOX_BASE_BACKOFF_MS:1000}
    retry-interval-ms: ${IM_OUTBOX_RETRY_INTERVAL_MS:5000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
