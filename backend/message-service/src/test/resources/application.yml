spring:
  task:
    scheduling:
      enabled: false
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        enabled: false
    openfeign:
      client:
        config:
          im-user-service:
            url: http://127.0.0.1:8085
          im-group-service:
            url: http://127.0.0.1:8086
          im-auth-service:
            url: http://127.0.0.1:8084
          im-server:
            url: http://127.0.0.1:8083
  datasource:
    url: jdbc:h2:mem:im_message_service;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

nacos:
  logging:
    default:
      config:
        enabled: false
