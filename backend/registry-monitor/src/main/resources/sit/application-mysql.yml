spring:
  datasource:
    url: jdbc:mysql://${IM_MYSQL_HOST:im-mysql}:${IM_MYSQL_PORT:3306}/service_registry_monitor_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&cacheServerConfiguration=true&useLocalSessionState=true
    username: ${IM_MYSQL_USERNAME:root}
    password: ${IM_MYSQL_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: registry-monitor-hikari
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      validation-timeout: 5000
