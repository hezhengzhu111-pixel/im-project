server:
  port: 8090

spring:
  application:
    name: im-registry-monitor
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

im:
  registry-monitor:
    poll:
      interval-ms: ${REGISTRY_MONITOR_POLL_INTERVAL_MS:5000}
    alert:
      fluctuation-threshold: ${REGISTRY_MONITOR_FLUCTUATION_THRESHOLD:0.2}
