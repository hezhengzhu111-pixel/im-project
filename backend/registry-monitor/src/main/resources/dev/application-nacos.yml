im:
  registry-monitor:
    nacos:
      base-url: ${IM_REGISTRY_MONITOR_NACOS_BASE_URL:http://127.0.0.1:8848/nacos}
spring:
  cloud:
    nacos:
      config:
        enabled: false
      discovery:
        server-addr: ${IM_NACOS_SERVER_ADDR:127.0.0.1:8848}
        service: im-registry-monitor
        namespace: public
        group: DEFAULT_GROUP
        metadata:
          env: dev
          transport: local
        heart-beat-interval: 1000
        heart-beat-timeout: 90000
        ip-delete-timeout: 120000
        naming-load-cache-at-start: false
