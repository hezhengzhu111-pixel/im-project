server:
  port: 8090

spring:
  application:
    name: im-registry-monitor
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - data-id: application-mysql.yml
            refresh: true
          - data-id: application-redis.yml
            refresh: true
          - data-id: application-kafka.yml
            refresh: true
  config:
    import:
      - optional:nacos:application-mysql.yml
      - optional:nacos:application-redis.yml
      - optional:nacos:application-kafka.yml
      - optional:nacos:application-nacos.yml
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

im:
  registry-monitor:
    poll:
      interval-ms: ${REGISTRY_MONITOR_POLL_INTERVAL_MS:5000}
    alert:
      fluctuation-threshold: ${REGISTRY_MONITOR_FLUCTUATION_THRESHOLD:0.2}
