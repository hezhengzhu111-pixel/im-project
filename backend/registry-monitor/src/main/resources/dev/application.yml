server:
  port: 8090

spring:
  application:
    name: im-registry-monitor
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false

im:
  logging:
    root-dir: ../logs
  snowflake:
    worker-id: 9
    datacenter-id: 1
  registry-monitor:
    poll:
      interval-ms: 5000
    alert:
      fluctuation-threshold: 0.2

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.im.registry: INFO
