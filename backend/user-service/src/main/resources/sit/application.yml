server:
  port: 8085

spring:
  application:
    name: im-user-service
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.r2dbc.R2dbcAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.r2dbc.R2dbcRepositoriesAutoConfiguration
  main:
    allow-bean-definition-overriding: true
  feign:
    client:
      config:
        default:
          loggerLevel: FULL
    httpclient:
      enabled: true
    hystrix:
      enabled: false

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

im:
  jwt:
    enabled: true
  virtual-threads:
    enabled: false
  logging:
    root-dir: /var/log/im-project
  snowflake:
    worker-id: 3
    datacenter-id: 2
  security:
    mode: gateway
    gateway-only:
      enabled: false
    gateway-fallback-jwt:
      enabled: true
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    root: INFO
    com.im: INFO
    com.im.feign: DEBUG
    feign: DEBUG
