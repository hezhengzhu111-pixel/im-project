server:
  port: 8084

spring:
  application:
    name: im-auth-service
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

jwt:
  secret: ${JWT_SECRET:im-backend-secret-key-for-jwt-token-generation-im-backend-secret-key-2026}
  expiration: ${JWT_EXPIRATION_MS:86400000}

auth:
  refresh:
    secret: ${JWT_REFRESH_SECRET:im-backend-refresh-secret-key}
    expiration: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  resource-cache:
    ttl-seconds: ${AUTH_RESOURCE_CACHE_TTL_SECONDS:3600}

im:
  jwt:
    enabled: false
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
