server:
  port: 8084

spring:
  application:
    name: im-auth-service
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

auth:
  refresh:
    secret: ${AUTH_REFRESH_SECRET:im-refresh-secret-im-refresh-secret-im-refresh-secret-im-refresh-secret}
    expiration: 604800000
  resource-cache:
    ttl-seconds: 3600
  ws-ticket:
    ttl-seconds: 30
  revoke:
    token-ttl-seconds: 86400

im:
  virtual-threads:
    enabled: false
  logging:
    root-dir: /var/log/im-project
  snowflake:
    worker-id: 2
    datacenter-id: 2
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  security:
    token-revocation-check:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.im: INFO
