server:
  port: 8088

spring:
  application:
    name: im-file-service
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

app:
  file:
    max-size: 10485760

im:
  jwt:
    enabled: true
  virtual-threads:
    enabled: false
  logging:
    root-dir: ../logs
  snowflake:
    worker-id: 6
    datacenter-id: 1
  security:
    mode: gateway
    gateway-only:
      enabled: false
    gateway-fallback-jwt:
      enabled: true
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  storage:
    local:
      base-dir: ../uploads
  cos:
    enabled: false
    https: true
    secret-id: ""
    secret-key: ""
    region: ""
    bucket: ""
    public-domain: ""
    path-prefix: im

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.im: INFO
