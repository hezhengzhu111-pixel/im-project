server:
  port: 8088

spring:
  application:
    name: im-file-service
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  servlet:
    multipart:
      max-file-size: ${IM_FILE_MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${IM_FILE_MULTIPART_MAX_REQUEST_SIZE:50MB}

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

app:
  file:
    image-max-size: ${IM_FILE_IMAGE_MAX_SIZE:5242880}
    file-max-size: ${IM_FILE_FILE_MAX_SIZE:10485760}
    audio-max-size: ${IM_FILE_AUDIO_MAX_SIZE:20971520}
    video-max-size: ${IM_FILE_VIDEO_MAX_SIZE:52428800}
    avatar-max-size: ${IM_FILE_AVATAR_MAX_SIZE:2097152}

im:
  jwt:
    enabled: true
  virtual-threads:
    enabled: false
  logging:
    root-dir: ../logs
  snowflake:
    worker-id: 6
    datacenter-id: 1
  security:
    mode: gateway
    gateway-only:
      enabled: false
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  storage:
    local:
      base-dir: ${IM_STORAGE_LOCAL_BASE_DIR:../uploads}
  cos:
    enabled: ${IM_COS_ENABLED:false}
    https: ${IM_COS_HTTPS:true}
    secret-id: ${IM_COS_SECRET_ID:}
    secret-key: ${IM_COS_SECRET_KEY:}
    region: ${IM_COS_REGION:}
    bucket: ${IM_COS_BUCKET:}
    public-domain: ${IM_COS_PUBLIC_DOMAIN:}
    path-prefix: ${IM_COS_PATH_PREFIX:im}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.im: INFO
