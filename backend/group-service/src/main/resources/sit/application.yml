server:
  port: 8086

spring:
  application:
    name: im-group-service
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-kafka.yml
      - optional:classpath:sit/application-nacos.yml
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

im:
  jwt:
    enabled: ${IM_JWT_ENABLED:true}
  security:
    mode: ${IM_SECURITY_MODE:gateway}
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret}
  gateway:
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000
