server:
  port: 8086

spring:
  application:
    name: im-group-service
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-kafka.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

im:
  jwt:
    enabled: true
  virtual-threads:
    enabled: false
  logging:
    root-dir: ../logs
  snowflake:
    worker-id: 4
    datacenter-id: 1
  security:
    mode: gateway
    gateway-only:
      enabled: false
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

feign:
  client:
    config:
      default:
        connectTimeout: 3000
        readTimeout: 10000

logging:
  level:
    root: INFO
    com.im: INFO
