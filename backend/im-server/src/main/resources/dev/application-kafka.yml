spring:
  kafka:
    bootstrap-servers: ${IM_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
    consumer:
      group-id: im-websocket-group-${im.instance-id}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-commit-interval: 300000
      max-poll-records: 100
      max-poll-interval: 300000
    listener:
      missing-topics-fatal: false

im:
  kafka:
    topic:
      private-message: im-private-message-topic
      group-message: im-group-message-topic
      offline-message: im-offline-message-topic
      push-prefix: im-ws-push-
      push: ${im.kafka.topic.push-prefix}${im.instance-id}
    consumer:
      concurrency: 3
      poll-timeout: 1000
    idempotency:
      ttl-ms: 600000
      cleanup-interval-ms: 60000