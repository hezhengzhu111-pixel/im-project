server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: im-server
  config:
    import:
      - optional:classpath:dev/application-mysql.yml
      - optional:classpath:dev/application-redis.yml
      - optional:classpath:dev/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  cloud:
    loadbalancer:
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

im:
  instance-id: ${HOSTNAME:${spring.application.name}}
  jwt:
    enabled: true
  virtual-threads:
    enabled: true
  logging:
    root-dir: ../logs
  snowflake:
    worker-id: 7
    datacenter-id: 1
  security:
    mode: gateway
    gateway-only:
      enabled: false
    gateway-fallback-jwt:
      enabled: true
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  server:
    executor:
      virtual-preferred: true
      max-concurrency: 2000
      queue-capacity: 2000
  heartbeat:
    interval: 30000
    timeout: 90000
  groupMessage:
    timeout: 86400000
    listNum: 20
  groupList:
    updateRate: 5000
  group:
    autoJoin: 1
    loginAuth: 1
  message:
    offline:
      expire-time: 604800
      max-count: 1000
      max-content-length: 10000
  retry:
    push-interval-ms: 1000
  websocket:
    endpoint: /websocket
    allowed-origins: "*"
    connection-timeout: 30000
    cleanup-interval-ms: 60000
    max-text-message-size: 8192
    max-binary-message-size: 8192
  service:
    url: ${IM_SELF_URL:http://127.0.0.1:8083}
    max-group-member-size: 500
  route:
    user-key-prefix: "im:route:user:"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.im: INFO
    org.springframework.web.socket: INFO

---
spring:
  config:
    activate:
      on-profile: test
  application:
    name: im-server

server:
  servlet:
    context-path: /im

im:
  heartbeat:
    timeout: 60000
    interval: 30000
  message:
    offline:
      expire-time: 86400
      max-count: 100
