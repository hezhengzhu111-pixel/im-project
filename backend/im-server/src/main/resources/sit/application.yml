server:
  port: 8083
  servlet:
    context-path: /

spring:
  application:
    name: im-server
  config:
    import:
      - optional:classpath:sit/application-mysql.yml
      - optional:classpath:sit/application-redis.yml
      - optional:classpath:sit/application-nacos.yml
  profiles:
    active: default
  threads:
    virtual:
      enabled: false
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true
  cloud:
    loadbalancer:
      enabled: true
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

jwt:
  secret: ${JWT_SECRET:im-access-secret-im-access-secret-im-access-secret-im-access-secret}
  expiration: 86400000
  header: Authorization
  prefix: "Bearer "

im:
  instance-id: ${IM_INSTANCE_ID:}
  auth:
    cookie:
      same-site: ${IM_AUTH_COOKIE_SAME_SITE:Lax}
      secure: ${IM_AUTH_COOKIE_SECURE:auto}
      ws-ticket-name: ${IM_WS_TICKET_COOKIE_NAME:IM_WS_TICKET}
      ws-ticket-path: ${IM_WS_TICKET_COOKIE_PATH:/websocket}
  jwt:
    enabled: true
  virtual-threads:
    enabled: true
  logging:
    root-dir: /var/log/im-project
  snowflake:
    worker-id: 7
    datacenter-id: 2
  security:
    mode: gateway
    gateway-only:
      enabled: false
    replay-protection:
      enabled: true
      ttl-seconds: 300
      key-prefix: "im:auth:replay:"
  internal:
    header: X-Internal-Secret
    secret: ${IM_INTERNAL_SECRET:im-internal-secret-im-internal-secret-im-internal-secret-im}
  gateway:
    user-id-header: X-User-Id
    username-header: X-Username
    auth:
      secret: ${IM_GATEWAY_AUTH_SECRET:im-gateway-auth-secret-im-gateway-auth-secret-im-gateway-auth-secret}
      max-skew-ms: 300000
  server:
    executor:
      virtual-preferred: true
      max-concurrency: 2000
      queue-capacity: 2000
  heartbeat:
    interval: 30000
    timeout: 90000
  groupMessage:
    timeout: 86400000
    listNum: 20
  groupList:
    updateRate: 5000
  group:
    autoJoin: 1
    loginAuth: 1
  message:
    offline:
      expire-time: 604800
      max-count: 1000
      max-content-length: 10000
  retry:
    push-interval-ms: 1000
    item-expire-ms: 60000
    janitor-initial-delay-ms: 15000
    janitor-interval-ms: 300000
  ws:
    channel-prefix: "im:channel:"
    retry:
      max-attempts: 20
      base-backoff-ms: 500
    idempotency:
      ttl-ms: 300000
  websocket:
    endpoint: /websocket
    allowed-origins: "${IM_WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:8080,http://127.0.0.1:8080}"
    connection-timeout: 30000
    cleanup-interval-ms: 60000
    send-time-limit-ms: 10000
    send-buffer-size-limit-bytes: 524288
    max-text-message-size: 8192
    max-binary-message-size: 8192
  service:
    url: ${IM_SELF_URL:http://im-server:8083}
    max-group-member-size: 500
  route:
    users-key: "im:route:users"
    lease-key-prefix: "im:route:lease:"
    lease-ttl-ms: 120000
    lease-renew-interval-ms: 30000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.im: INFO
    org.springframework.web.socket: INFO

---
spring:
  config:
    activate:
      on-profile: test
  application:
    name: im-server

server:
  servlet:
    context-path: /im

im:
  heartbeat:
    timeout: 60000
    interval: 30000
  message:
    offline:
      expire-time: 86400
      max-count: 100
